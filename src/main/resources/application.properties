# ─────────────────────────────────────────────────────
# MongoDB Atlas Connection
# Set MONGODB_URI as an environment variable or GitHub Secret
# ─────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ecommercedb}

# ─────────────────────────────────────────────────────
# JWT Settings
# Set JWT_SECRET as an environment variable or GitHub Secret
# ─────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ChangeThisSecretKeyWhichIsLongEnoughForHS512}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─────────────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────────────
server.port=${PORT:8080}
